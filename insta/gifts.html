<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Link Component</title>
    <style>
        .share-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            text-align: center;
            background-color: #ffffff;
        }
        .input-group {
            display: flex;
            margin-top: 15px;
            gap: 5px;
        }
        .link-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .copy-btn {
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .copy-btn:hover {
            background-color: #1877f2;
        }
        .status-msg {
            margin-top: 10px;
            font-size: 12px;
            color: green;
        }
    </style>
</head>
<body>

<div class="share-container">
    <h3>Referral Link</h3>
    <p>Copy the link below to share with your network:</p>
    
    <div class="input-group">
        <input type="text" id="shareLink" class="link-input" value="https://example.com" readonly>
        <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
    <div id="copyStatus" class="status-msg"></div>
</div>

<script>
function copyLink() {
    const linkInput = document.getElementById("shareLink");
    const statusMsg = document.getElementById("copyStatus");

    // Copy the text inside the text field using the Clipboard API
    navigator.clipboard.writeText(linkInput.value)
        .then(() => {
            statusMsg.innerText = "Link copied to clipboard!";
            // Optional: clear message after 3 seconds
            setTimeout(() => { statusMsg.innerText = ""; }, 3000);
        })
        .catch(err => {
            console.error("Failed to copy text: ", err);
            statusMsg.style.color = "red";
            statusMsg.innerText = "Failed to copy link. Please manually select and copy.";
        });
}
</script>

</body>
</html>
